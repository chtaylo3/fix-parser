name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintains a version-bump "release PR" (+ changelog). Merging it is approval #1
  # and creates a DRAFT GitHub release (no git tag yet — a draft creates the tag
  # only when published). Pure git/API tooling — no build.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
      sha: ${{ steps.rp.outputs.sha }}
    steps:
      # Run release-please as a GitHub App rather than the default GITHUB_TOKEN.
      # Two reasons (see decision issue #6 / immutable-releases setup):
      #   1. App-authored release PRs DO trigger CI (GITHUB_TOKEN-authored events
      #      are suppressed, leaving release PRs with no required checks).
      #   2. The App is a bypass actor on the release-tags-immutable ruleset, so
      #      it can create the v* release tag (the bot/GITHUB_TOKEN cannot).
      # The minted token is short-lived (~1h) and repo-scoped.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Builds artifacts and attaches them to the DRAFT release while it is still
  # mutable, then publishes it (which creates the tag and finalizes immutability
  # WITH the assets). This ordering is mandatory: with immutable releases on, you
  # cannot add assets to an already-published release. Gated by the "release"
  # Environment (required reviewer) = approval #2 before going live.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
    steps:
      # Check out the release commit by SHA: a draft release has no git tag yet
      # (the tag is created only when we publish it below).
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Use preinstalled vcpkg
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Build x64 plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          cmake --preset ci
          cmake --build --preset ci-release --target fixparser_plugin

      - name: Build x86 plugin
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x86 -host_arch=x64'
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          cmake --preset ci-x86
          cmake --build --preset ci-x86-release --target fixparser_plugin

      # C (decision #6): hard-fail before going live if the embedded DLL version
      # does not equal the release version. This is the enforcement layer behind
      # B's warn-and-fall-back (e.g. it rejects the 0.0.0 sentinel) and catches a
      # stale build cache, a wrong checkout ref, or a manual release-as override.
      - name: Verify embedded DLL version matches the release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Pad release-please's M.N.P to the DLL's four-part M.N.P.0 form and
          # drop any prerelease suffix (which the DLL cannot carry).
          $expected = '${{ needs.release-please.outputs.version }}' -replace '-.*$', ''
          while (($expected -split '\.').Count -lt 4) { $expected += '.0' }
          # Check the exact files package.ps1 will ship (deterministic Release\
          # path), not a recursive first-match that could grab a stale build.
          foreach ($dll in 'build/ci/Release/FixParser.dll', 'build/ci-x86/Release/FixParser.dll') {
            if (-not (Test-Path $dll)) { throw "Built plugin not found: $dll" }
            $fv = [System.Diagnostics.FileVersionInfo]::GetVersionInfo((Resolve-Path $dll)).FileVersion
            Write-Host "$dll -> FileVersion $fv (expected $expected)"
            if ($fv -ne $expected) {
              throw "Embedded version mismatch in $dll : DLL '$fv' != release '$expected'. Refusing to publish (decision #6, C)."
            }
          }

      - name: Package x64 + x86
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # No -Version: package.ps1 derives it from the (now C-verified) binary.
          ./scripts/package.ps1 `
            -X64BuildDir (Resolve-Path build/ci).Path `
            -X86BuildDir (Resolve-Path build/ci-x86).Path

      # Publishing the draft creates the v* tag, which is subject to the
      # release-tags-immutable ruleset's creation rule -- so this must run as the
      # App (the bypass actor), not the default GITHUB_TOKEN.
      - name: Mint App token for release publish
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: Upload assets and publish the release
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ needs.release-please.outputs.tag_name }}'
          $zips = (Get-ChildItem dist/*.zip).FullName
          # Attach assets while the release is still a draft (mutable). gh native
          # exit codes don't trip $ErrorActionPreference, so check them explicitly
          # -- a swallowed upload failure is exactly what shipped an empty v0.1.1.
          gh release upload $tag @zips --clobber
          if ($LASTEXITCODE) { throw "asset upload to draft release failed" }
          # Un-draft = publish: creates the tag and locks the release (now WITH assets).
          gh release edit $tag --draft=false --latest
          if ($LASTEXITCODE) { throw "publishing (un-drafting) the release failed" }
