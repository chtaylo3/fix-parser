name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: # required so checks report on merge-queue branches
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

jobs:
  analyze:
    name: CodeQL (c-cpp)
    runs-on: windows-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Use preinstalled vcpkg
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended

      # Manual build so CodeQL traces the real compiler invocations. Same
      # VS-version-agnostic dev-shell + Ninja Multi-Config build as CI.
      - name: Build (MSVC dev shell + Ninja Multi-Config)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No Visual Studio with VC tools found on the runner." }
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          cmake --preset ci
          cmake --build --preset ci-debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
