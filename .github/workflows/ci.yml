name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core library + unit tests (${{ matrix.configuration }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Use preinstalled vcpkg
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          # Surface that commit so local dev can match it for parity when desired
          # (README: "Keeping local vcpkg in sync with CI").
          $sha = git -C "$env:VCPKG_INSTALLATION_ROOT" rev-parse HEAD
          Write-Host "Runner vcpkg commit: $sha"
          Add-Content $env:GITHUB_STEP_SUMMARY "Runner vcpkg commit: ``$sha``"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/ci/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure, build & test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $preset = '${{ matrix.configuration == 'Debug' && 'ci-debug' || 'ci-release' }}'

          # Load the MSVC toolchain onto PATH without a third-party action, so the
          # Ninja generator finds cl/link. This is VS-version-agnostic: vswhere
          # picks whatever Visual Studio (17, 18, ...) the runner image ships.
          Write-Host "::group::Load MSVC developer environment"
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No Visual Studio with VC tools found on the runner." }
          Write-Host "Using Visual Studio at: $vsPath"
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'
          # Enter-VsDevShell overwrites VCPKG_ROOT with the VS-bundled vcpkg; re-assert
          # the runner's preinstalled vcpkg so the manifest resolves against it.
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          Write-Host "::endgroup::"

          Write-Host "::group::Configure (Ninja Multi-Config)"
          cmake --preset ci
          if ($LASTEXITCODE) { throw "configure failed" }
          Write-Host "::endgroup::"

          Write-Host "::group::Build ($preset)"
          cmake --build --preset $preset
          if ($LASTEXITCODE) { throw "build failed" }
          Write-Host "::endgroup::"

          Write-Host "::group::Test ($preset)"
          ctest --preset $preset
          if ($LASTEXITCODE) { throw "tests failed" }
          Write-Host "::endgroup::"

      - name: Stage plugin package
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # The x64-windows-static triplet links pugixml + the CRT statically, so
          # FixParser.dll is self-contained -- there is no pugixml.dll to copy.
          # Locate the DLL wherever Ninja Multi-Config placed it under build/ci.
          $dll = Get-ChildItem build/ci -Recurse -Filter FixParser.dll | Select-Object -First 1
          if (-not $dll) { throw "FixParser.dll not found under build/ci" }
          $stage = "package/FixParser"
          New-Item -ItemType Directory -Force -Path "$stage/dictionaries" | Out-Null
          Copy-Item $dll.FullName "$stage/" -Force
          Copy-Item "build/ci/dictionaries/*.xml" "$stage/dictionaries/" -Force
          Copy-Item "build/ci/dictionaries/NOTICE.txt" "$stage/dictionaries/" -Force

      - name: Upload plugin artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: FixParser-plugin-x64
          path: package/FixParser/**

  sanitize:
    name: AddressSanitizer (core + tests)
    # Pinned to VS 2022: the VS 2026 STL emits an extra ASan container annotation
    # (annotate_optional) whose opt-out macro differs, causing LNK2038 against the
    # non-instrumented vcpkg Catch2. VS 2022's _DISABLE_STRING/VECTOR_ANNOTATION
    # is sufficient and matches the locally-validated environment.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Use preinstalled vcpkg
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/sanitize/vcpkg_installed
          key: vcpkg-asan-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-asan-${{ runner.os }}-

      - name: Build & test under AddressSanitizer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No Visual Studio with VC tools found on the runner." }
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          Write-Host "::group::Configure (MSVC ASan)"
          cmake --preset sanitize
          if ($LASTEXITCODE) { throw "configure failed" }
          Write-Host "::endgroup::"
          Write-Host "::group::Build"
          cmake --build --preset sanitize
          if ($LASTEXITCODE) { throw "build failed" }
          Write-Host "::endgroup::"
          Write-Host "::group::Test under ASan"
          ctest --preset sanitize
          if ($LASTEXITCODE) { throw "tests failed under ASan" }
          Write-Host "::endgroup::"

  clang-tidy:
    name: clang-tidy (core)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use preinstalled vcpkg
        shell: pwsh
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/tidy/vcpkg_installed
          key: vcpkg-tidy-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-tidy-${{ runner.os }}-

      - name: Lint core with clang-tidy
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "No Visual Studio with VC tools found on the runner." }
          Import-Module (Join-Path $vsPath 'Common7\Tools\Microsoft.VisualStudio.DevShell.dll')
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64 -host_arch=x64'
          # clang-tidy ships with the runner's LLVM; make sure it is on PATH.
          $env:PATH = (Join-Path $env:ProgramFiles 'LLVM\bin') + ';' + $env:PATH
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          cmake --preset tidy
          if ($LASTEXITCODE) { throw "configure failed" }
          cmake --build --preset tidy
          if ($LASTEXITCODE) { throw "clang-tidy reported errors (bugprone-*/clang-analyzer-*/cert-*)" }
